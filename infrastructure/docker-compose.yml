services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: code_review_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-review_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-code_review}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-review_agent} -d ${POSTGRES_DB:-code_review}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
